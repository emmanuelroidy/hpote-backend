spring.application.name=hpote-backend

server.port=${PORT:8080}

server.address=0.0.0.0

# ===============================
# DATASOURCE (MySQL)
# ===============================
#spring.datasource.url=jdbc:mysql://localhost:3306/hpote_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
#spring.datasource.username=hpote_user
#spring.datasource.password=hpote123



spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# JACKSON
# ===============================
spring.jackson.time-zone=Africa/Dar_es_Salaam

